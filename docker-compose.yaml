version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: littlelemon_mysql
    restart: always
    environment:
      MYSQL_DATABASE: littlelemon
      MYSQL_ROOT_PASSWORD: littlelemon
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: